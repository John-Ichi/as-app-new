name: PR Agent Automated Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          GITHUB_TOKEN: ${{ secrets.PR_AGENT_TOKEN }}

          config.model: "ollama/qwen3.5:397b-cloud"
          config.fallback_models: '["ollama/qwen3.5:397b-cloud"]'
          config.custom_model_max_tokens: "8000"
          config.max_diff_tokens: "32000"

          OLLAMA.API_KEY: ${{ secrets.OLLAMA_API_KEY}}
          OLLAMA.API_BASE: "https://ollama.com"

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
