name: PR Agent Automated Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run PR Agent Engine
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          CONFIG__LOG_LEVEL: "DEBUG"
          PR_AGENT__AUTOMATION__AUTO_REVIEW: "true"
          GITHUB_TOKEN: ${{ secrets.PR_AGENT_TOKEN }}

          GITHUB_ACTION_CONFIG__HANDLE_SYNCHRONIZE_EVENTS: "true"

          CONFIG__MODEL: "ollama/qwen3-coder:480b-cloud"
          CONFIG__FALLBACK_MODELS: "['ollama/qwen3-coder:480b-cloud']"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "128000"

          OLLAMA_API_BASE: "https://ollama.com/v1"
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

          OPENAI_KEY: "placeholder"
