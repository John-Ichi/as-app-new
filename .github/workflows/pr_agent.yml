name: PR Agent Automated Review

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run PR Agent Engine
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          OPENAI_KEY: ${{ secrets.OLLAMA_API_KEY}}
          GITHUB_TOKEN: ${{ secrets.PR_AGENT_TOKEN }}

          config.model: "openai/qwen3-coder:480b-cloud"
          config.fallback_models: '["openai/qwen3-coder:480b-cloud"]'
          config.custom_model_max_tokens: "8000"
          config.max_diff_tokens: "32000"

          OPENAI.API_BASE: "https://ollama.com/v1"

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.handle_push_trigger: "true"
