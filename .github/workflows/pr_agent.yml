name: PR Agent Automated Review

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run PR Agent Engine
        uses: the-pr-agent/pr-agent@v0.39.0
        env:
          # Automatically triggers an inline review comment block on every new PR
          PR_AGENT.AUTOMATION.AUTO_REVIEW: "true"

          # Pulls your secure GitHub authentication token from the repository secrets
          GITHUB_TOKEN: ${{ secrets.PR_AGENT_TOKEN }}
          OPENAI_KEY: "ollama"

          # Sets up your target Ollama Cloud configuration
          CONFIG.MODEL: "openai/qwen3-coder:480b-cloud"
          CONFIG.FALLBACK_MODELS: "['openai/qwen3-coder:480b-cloud']"
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "128000"
          OLLAMA.API_BASE: "https://ollama.com/v1"
          OLLAMA.API_KEY: ${{ secrets.OLLAMA_API_KEY }}
